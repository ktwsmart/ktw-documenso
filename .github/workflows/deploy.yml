# CI 預建 Image → GHCR → Zeabur PREBUILT（照 ktw-saas-platform 標準）
# 觸發: push main（排除純文件）
# 流程: checkout → buildx(docker driver, 吃 runner 16G) → build(docker/Dockerfile, runner 階段) → push GHCR → 觸發 Zeabur
name: build-and-deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore: ['**.md']

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 取得 meta
        id: meta
        run: |
          echo "sha12=$(echo ${{ github.sha }} | cut -c1-12)" >> $GITHUB_OUTPUT
          echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: 建構 image（Documenso 官方 docker/Dockerfile、runner 階段）
        run: |
          docker build \
            --memory=12g \
            --target runner \
            -f docker/Dockerfile \
            -t ghcr.io/${{ steps.meta.outputs.owner_lc }}/ktw-documenso:sha-${{ steps.meta.outputs.sha12 }} \
            -t ghcr.io/${{ steps.meta.outputs.owner_lc }}/ktw-documenso:latest \
            .

      - name: 推送 image
        run: |
          docker push ghcr.io/${{ steps.meta.outputs.owner_lc }}/ktw-documenso:sha-${{ steps.meta.outputs.sha12 }}
          docker push ghcr.io/${{ steps.meta.outputs.owner_lc }}/ktw-documenso:latest

      - name: 觸發 Zeabur 部署
        if: vars.ZEABUR_SERVICE_ID != '' && vars.ZEABUR_SERVICE_ID != 'pending'
        run: |
          OUT=$(npx zeabur@latest service update tag \
            --id ${{ vars.ZEABUR_SERVICE_ID }} \
            -t sha-${{ steps.meta.outputs.sha12 }} \
            -y -i=false 2>&1)
          echo "$OUT"
          if echo "$OUT" | grep -qiE "ERROR|unknown flag|unknown command"; then exit 1; fi
        env:
          ZEABUR_TOKEN: ${{ secrets.ZEABUR_API_TOKEN }}
